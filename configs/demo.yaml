# Demo experiment: greedy baseline on German-7, 3 request loads x 3 seeds.
# Run with:  qkdbench run -c configs/demo.yaml
name: demo
output: results/demo.csv
algorithms: [greedy_sp]
instances:
  topology: german7
  n_requests: [10, 20, 30]
  seeds: [1, 2, 3]
  num_slots: 5
  wavelengths: 2
  modules_per_node: 2
  mean_volume_kb: 100
  rate_table: fse_1540_alone
algo_params:
  greedy_sp: {k_paths: 3}

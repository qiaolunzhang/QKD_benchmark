id: geant2
version: "1.0"
source: |
  GEANT2 pan-European research network, reduced to 30 nodes / 48 links.
  Source: Internet Topology Zoo (topology-zoo.org), Geant2009.graphml
  (GEANT2-era snapshot, 34 nodes / 52 links, full WGS84 coordinates;
  S. Knight et al., 'The Internet Topology Zoo', IEEE JSAC 2011).
  Reduction rule (mechanical, no hand edits): multi-edges collapsed,
  then degree-1 leaf nodes removed iteratively (drops 4 stub PoPs);
  the result is connected. Node ids are the country-code labels.
  Link lengths: great-circle distance of node coordinates,
  method: haversine (the source has no authoritative fibre lengths).
  National-scale lengths: for QKD reach use
  make_instance(length_scale=...).
directed: false

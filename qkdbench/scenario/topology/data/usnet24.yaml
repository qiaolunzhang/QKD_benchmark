id: usnet24
version: "1.0"
source: |
  24-node USnet-like mesh: 4x6 grid backbone (38 edges) + 5 diagonal
  chords = 43 undirected links; the size/structure of the 24-node USnet
  used in the RCKTA journal. Ported from INFOCOM'27 RCKTA-FSE
  rckta_fse/common/instances.py _usnet_edges(). Link lengths are drawn
  per experiment seed: random.Random(1000 + seed), U[lo, hi] km, round 2,
  in the file order of the links below (grid rows, then columns, then
  chords) - bit-for-bit identical to the INFOCOM'27 implementation.
directed: false
length_policy:
  mode: uniform
  lo: 2.0
  hi: 8.0
  base_seed: 1000

id: nsfnet14
version: "1.0"
source: |
  NSFNET T1 backbone, 14 nodes / 21 links - the classic US optical
  network benchmark topology. Link lengths (km, 300-2800) from
  B. G. Bathula and V. M. Vokkarane, 'Constraint-Based Anycasting Over
  Optical Burst Switched Networks', IEEE/OSA JOCN, as ported in the
  ITU Journal project (utils/opttopology.py get_nsf_topology()).
  Node ids 1..14 follow that reference (1=WA ... 14=MD/DC); no
  coordinates in the source, so none are fabricated here.
  Lengths are national-scale: for QKD reach (<= 70 km) use
  make_instance(length_scale=...) - the INFOCOM'27 fiber_factor idea.
